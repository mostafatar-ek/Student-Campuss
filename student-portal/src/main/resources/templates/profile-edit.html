<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile – Student Portal</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="app-layout">

    <div th:replace="~{fragments/sidebar :: sidebar('profile')}"></div>

    <main class="main-content">
        <div style="max-width:560px;margin:0 auto">

            <div class="section-header">
                <h2>Edit Profile</h2>
                <a th:href="@{/profile}" class="btn btn-ghost">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
            </div>

            <div class="card">
                <form th:action="@{/profile/update}" method="post">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name"
                               th:value="${student.name}" required>
                    </div>
                    <div class="form-group">
                        <label for="major">Major / Field of Study</label>
                        <input type="text" id="major" name="major"
                               th:value="${student.major}" placeholder="e.g. Computer Science">
                    </div>
                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" name="bio" rows="4"
                                  placeholder="Tell others about yourself..."
                                  th:text="${student.bio}"></textarea>
                    </div>
                    <div class="form-actions" style="margin-top:8px">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a th:href="@{/profile}" class="btn btn-ghost">Cancel</a>
                    </div>
                </form>
            </div>

        </div>
    </main>
</div>
</body>
</html>
