<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Student Portal</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div id="auth-page" class="page active">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-graduation-cap"></i>
            <h1>Student Portal</h1>
            <p>Connect, Learn, Grow Together</p>
        </div>

        <div class="auth-tabs">
            <a th:href="@{/login}" class="auth-tab">Login</a>
            <a th:href="@{/register}" class="auth-tab active">Register</a>
        </div>

        <form th:action="@{/register}" method="post" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe"
                       th:value="${name}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com"
                       th:value="${email}" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Min 6 characters" required>
            </div>
            <div class="form-group">
                <label for="major">Major / Field of Study</label>
                <input type="text" id="major" name="major"
                       placeholder="e.g. Computer Science" th:value="${major}">
            </div>
            <div class="auth-error" th:if="${error}" th:text="${error}"></div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-muted)">
            Already have an account? <a th:href="@{/login}" style="color:var(--primary)">Login</a>
        </p>
    </div>
</div>
</body>
</html>
